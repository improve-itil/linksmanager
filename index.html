<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ניהול קישורי לומדות</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 480px;
      box-sizing: border-box;
    }
    h1 {
      color: #0f172a;
      text-align: center;
      margin: 0 0 8px 0;
      font-size: 24px;
      font-weight: 800;
    }
    p.subtitle {
      color: #64748b;
      text-align: center;
      margin: 0 0 30px 0;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #334155;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #2563eb;
    }
    button {
      width: 100%;
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    button:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
    }
    #message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      font-size: 14px;
      display: none;
    }
    .success {
      background-color: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    .error {
      background-color: #fef2f2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>ניהול קישורי לומדות</h1>
    <p class="subtitle">עדכון מהיר של כתובות היעד בלחיצת כפתור אחת</p>

    <form id="updateForm">
      <div class="form-group">
        <label for="key">מזהה הלומדה (ID באנגלית, למשל: ethics-v2)</label>
        <input type="text" id="key" required placeholder="ethics-v2">
      </div>
      <div class="form-group">
        <label for="value">כתובת ה-URL החדשה ללומדה (הקישור האמיתי)</label>
        <input type="url" id="value" required placeholder="https://lomdda.com/...">
      </div>
      <button type="submit" id="submitBtn">עדכן קישור בלחיצת כפתור ⚡</button>
    </form>

    <div id="message"></div>
  </div>

  <script>
    const form = document.getElementById('updateForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const key = document.getElementById('key').value.trim().toLowerCase();
      const value = document.getElementById('value').value.trim();

      submitBtn.disabled = true;
      submitBtn.innerText = 'מעדכן שרת Vercel...';
      messageDiv.style.display = 'none';

      try {
        const response = await fetch('/api/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key, value })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          messageDiv.className = 'success';
          messageDiv.innerText = `הקישור של "${key}" עודכן בהצלחה!`;
          document.getElementById('key').value = '';
          document.getElementById('value').value = '';
        } else {
          messageDiv.className = 'error';
          messageDiv.innerText = result.error || 'שגיאה בעדכון הקישור בשרת.';
        }
      } catch (err) {
        messageDiv.className = 'error';
        messageDiv.innerText = 'שגיאה בחיבור לרשת.';
      } finally {
        messageDiv.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerText = 'עדכן קישור בלחיצת כפתור ⚡';
      }
    });
  </script>
</body>
</html>
